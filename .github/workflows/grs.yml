name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
      GH_STATS_BASE_URL: ${{ secrets.GH_STATS_BASE_URL }}
      API_TOKEN: ${{ secrets.GH_STATS_TOKEN || github.token }}
      GITHUB_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download profile cards
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p profile

          if [ -z "${GH_STATS_BASE_URL:-}" ]; then
            echo "GH_STATS_BASE_URL secret is required and should point to your self-hosted GitHub Readme Stats instance." >&2
            exit 1
          fi

          stats_base_url="${GH_STATS_BASE_URL%/}"
          stats_url="${stats_base_url}/api?username=${{ github.repository_owner }}&show_icons=true&theme=radical&hide_border=true&cache_seconds=86400"
          langs_url="${stats_base_url}/api/top-langs/?username=${{ github.repository_owner }}&layout=compact&theme=radical&hide_border=true&cache_seconds=86400"

          if [ -n "${GH_STATS_TOKEN:-}" ]; then
            stats_url="${stats_url}&token=${GH_STATS_TOKEN}"
            langs_url="${langs_url}&token=${GH_STATS_TOKEN}"
          fi

          curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 15 "${stats_url}" -o profile/stats.svg || printf '%s\n' '<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img"><rect width="495" height="195" rx="16" fill="#0f172a"/><text x="32" y="62" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">GitHub Stats</text><text x="32" y="98" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Stats card temporarily unavailable.</text></svg>' > profile/stats.svg
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 15 "${langs_url}" -o profile/top-langs.svg || printf '%s\n' '<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img"><rect width="495" height="195" rx="16" fill="#0f172a"/><text x="32" y="62" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Top Languages</text><text x="32" y="98" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Language breakdown temporarily unavailable.</text></svg>' > profile/top-langs.svg
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 15 "https://streak-stats.demolab.com/?user=${{ github.repository_owner }}&theme=radical&hide_border=true" -o profile/streak.svg || printf '%s\n' '<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img"><rect width="495" height="195" rx="16" fill="#0f172a"/><text x="32" y="62" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">GitHub Streak</text><text x="32" y="98" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Streak card temporarily unavailable.</text></svg>' > profile/streak.svg
          # trophies.svg will be generated in a separate step using actions/github-script
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 --connect-timeout 15 "https://komarev.com/ghpvc/?username=${{ github.repository_owner }}&color=0e75b6" -o profile/visitor-count.svg || printf '%s\n' '<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img"><rect width="495" height="195" rx="16" fill="#0f172a"/><text x="32" y="62" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Visitor Count</text><text x="32" y="98" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="15">Profile views badge temporarily unavailable.</text></svg>' > profile/visitor-count.svg

      - name: Generate trophies (local)
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const { data: user } = await github.rest.users.getByUsername({ username: owner });
            const followers = user.followers || 0;
            const public_repos = user.public_repos || 0;
            const login = user.login || owner;
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="495" height="120" viewBox="0 0 495 120" role="img"><rect width="495" height="120" rx="16" fill="#0f172a"/><text x="24" y="40" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">GitHub Trophies</text><text x="24" y="72" fill="#94a3b8" font-family="Segoe UI, Arial, sans-serif" font-size="16">${login} • Followers: ${followers} • Public repos: ${public_repos}</text></svg>`;
            fs.writeFileSync('profile/trophies.svg', svg, 'utf8');

      - name: Commit cards
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update README cards"
          git push